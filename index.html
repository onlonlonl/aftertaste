<style>
*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;background:#1c1614;font-family:'DotGothic16',monospace;color:#e8ddd4;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1c1614}
::-webkit-scrollbar-thumb{background:#3d322e}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.shell{min-height:100vh;position:relative}
.dot-bg{position:fixed;inset:0;background-image:radial-gradient(circle,#2a2220 1px,transparent 1px);background-size:16px 16px;opacity:.5;pointer-events:none;z-index:0}

.title{color:#e8ddd4;letter-spacing:8px;text-transform:uppercase}
.label{letter-spacing:3px;text-transform:uppercase;font-size:10px;color:#8a7b72}
.footer{text-align:center;letter-spacing:3px;text-transform:uppercase;font-size:9px;color:#5a4e48;padding:16px 0}

.btn{padding:7px 16px;border:2px solid #3d322e;background:#2a2220;color:#e8ddd4;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'DotGothic16',monospace;cursor:pointer;box-shadow:2px 2px 0 #120e0c}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #120e0c}
.btn-dk{padding:7px 16px;border:2px solid #6b3a2a;background:#6b3a2a;color:#e8ddd4;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'DotGothic16',monospace;cursor:pointer;box-shadow:3px 3px 0 #120e0c}
.btn-dk:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #120e0c}

.filter-active{background:#6b3a2a!important;color:#e8ddd4!important;border:2px solid #6b3a2a!important}
.filter-inactive{background:#2a2220!important;color:#8a7b72!important;border:2px solid #3d322e!important}
.sort-active{background:#6b3a2a!important;color:#e8ddd4!important;border:2px solid #6b3a2a!important}
.sort-inactive{background:#2a2220!important;color:#8a7b72!important;border:2px solid #3d322e!important}

.input{width:100%;padding:8px 10px;border:2px solid #3d322e;background:#1c1614;color:#e8ddd4;font-family:'DotGothic16',monospace;font-size:12px;outline:none}
.input::placeholder{color:#5a4e48}

.tile{border:2px solid #3d322e;box-shadow:3px 3px 0 #120e0c;cursor:pointer;transition:transform .1s;image-rendering:pixelated}
.lux-dot{position:absolute;top:-3px;right:-3px;width:7px;height:7px;background:#c8a24e;border:1px solid #120e0c}

.modal-bg{position:fixed;inset:0;background:rgba(12,8,6,.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-box{background:#2a2220;border:2px solid #3d322e;box-shadow:4px 4px 0 #120e0c;max-width:360px;width:100%;padding:20px}
.note-box{padding:10px;background:#1c1614;border:1px dashed #3d322e;color:#e8ddd4;font-size:12px;line-height:1.6}
.lux-box{padding:10px;background:#1c1614;border:2px solid #3d322e;color:#8a7b72;font-size:12px;line-height:1.8}
</style>
